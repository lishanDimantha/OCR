name: Scanner and Frontend CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # Python Scanner සඳහා වන Job එක
  scanner-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        # මෙහි working-directory එක ඔබේ Quick_Read_Scanner ෆෝල්ඩරයට යොමු කළ යුතුය
        working-directory: ./Quick_Read_Scanner/backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi uvicorn requests httpx opencv-python-headless python-dotenv numpy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        working-directory: ./Quick_Read_Scanner/backend
        run: pytest || echo "No tests found"

  # React Native Frontend සඳහා වන Job එක
  mobile-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          # cache වැඩ කිරීමට package-lock.json ඇති තැන පෙන්වන්න
          cache-dependency-path: quick-read-frontend/mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./quick-read-frontend/mobile
        run: npm install

      - name: Run Lint
        working-directory: ./quick-read-frontend/mobile
        run: npm run lint || echo "Linting skipped"
