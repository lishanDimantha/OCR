name: k6 Load Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  k6_test:
    name: Run k6 Load Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: quickread
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21" # This is fine, but match go.mod if it fails

      - name: Build and Start Server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: user
          DB_PASSWORD: password
          DB_NAME: quickread
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          OCR_SERVICE_URL: http://localhost:8000/api/v1
        run: |
          go build -o main ./cmd/api/main.go
          ./main &
          sleep 15 # Increased slightly to ensure DB is ready

      - name: Run k6 test
        uses: grafana/k6-action@v0.3.0
        with:
          filename: tests/quickread_load_test.js
          flags: --env BASE_URL=http://localhost:8080/api --env TEST_EMAIL=${{ secrets.TEST_EMAIL }} --env TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}
