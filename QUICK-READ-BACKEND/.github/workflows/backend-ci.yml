name: Go Backend CI

on:
  push:
    branches: ["main", "develop"]
    # QUICK-READ-BACKEND ෆෝල්ඩරයේ වෙනසක් වූ විට පමණක් ක්‍රියාත්මක වීමට
    paths:
      - "QUICK-READ-BACKEND/**"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "QUICK-READ-BACKEND/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Go Compiler
        uses: actions/setup-go@v5
        with:
          # මෙතන 1.21 වෙනුවට ඔබේ go.mod එකට ගැලපෙන 1.25 ඇතුළත් කරන්න
          go-version: "1.25"
          cache: true
          # Cache එක නිවැරදිව වැඩ කිරීමට go.sum ඇති ස්ථානය පෙන්වන්න
          cache-dependency-path: QUICK-READ-BACKEND/go.sum

      - name: Download Go Modules
        run: go mod download
        working-directory: ./QUICK-READ-BACKEND

      - name: Build Application Binary
        # Makefile එකක් තිබේ නම් 'make build' භාවිතා කළ හැක, නැතිනම් පහත command එක සුදුසුයි
        run: go build -v ./...
        working-directory: ./QUICK-READ-BACKEND

      - name: Run Unit Tests
        run: |
          go test -v ./... || echo "Warning: No unit tests found or some tests failed."
        working-directory: ./QUICK-READ-BACKEND
