name: Deploy to Render

on:
  push:
    branches: ["main"]
  # මෙය අතින් (manually) run කිරීමටද ඉඩ ලබා දෙයි
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    # මෙම job එක ක්‍රියාත්මක වන්නේ අනෙක් CI jobs සාර්ථක වුවහොත් පමණක් බවට
    # වග බලා ගැනීමට මීළඟ වතාවේදී මෙය තවත් දියුණු කළ හැක.

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
