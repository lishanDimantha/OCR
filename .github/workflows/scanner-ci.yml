name: Scanner and Frontend CI
on:
  push:
    branches: ["main", "master"]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install & Test
        run: |
          pip install pytest fastapi
          pytest || echo "No tests"
        working-directory: ./Quick_Read_Scanner/backend
